name: SomaAI

options:
  bundleIdPrefix: com.olegkonovalov
  deploymentTarget:
    iOS: 17.0

settings:
  base:
    SWIFT_VERSION: 5.9
    GENERATE_INFOPLIST_FILE: YES

configurations:
  Debug: debug
  Release: release

targets:
  SomaAI:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
      - path: Sources/Models
      - path: Sources/Views
    resources:
      - path: LaunchScreen.storyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oleg.SomaAI
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTED_PLATFORMS: iphoneos iphonesimulator
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        CODE_SIGN_STYLE: Automatic
